name: Deploy Production

on:
  push:
    branches:
      - master

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Yandex Object Storage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    env:
      YC_CDN_RESOURCE_ID: ${{ vars.YC_CDN_RESOURCE_ID }}
      YC_SA_KEY_JSON: ${{ secrets.YC_SA_KEY_JSON }}
    steps:
      - name: Check that push came from a merged PR
        id: pr_check
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const response = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner,
              repo,
              commit_sha: context.sha,
            });

            const mergedPullRequest = response.data.find((pullRequest) => {
              return pullRequest.merged_at && pullRequest.base.ref === 'master';
            });

            core.setOutput('should_deploy', mergedPullRequest ? 'true' : 'false');

            if (mergedPullRequest) {
              core.notice(`Deploying merge of PR #${mergedPullRequest.number} into master.`);
            } else {
              core.notice('Skipping deploy: this push is not linked to a merged PR into master.');
            }

      - name: Check out repository
        if: steps.pr_check.outputs.should_deploy == 'true'
        uses: actions/checkout@v4

      - name: Set up Node.js
        if: steps.pr_check.outputs.should_deploy == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: steps.pr_check.outputs.should_deploy == 'true'
        run: npm ci

      - name: Build static site
        if: steps.pr_check.outputs.should_deploy == 'true'
        run: npm run build-static
        env:
          DATOCMS_API_TOKEN: ${{ secrets.DATOCMS_API_TOKEN }}
          DATOCMS_PUBLIC_TOKEN: ${{ secrets.DATOCMS_PUBLIC_TOKEN }}

      - name: Upload build to Object Storage
        if: steps.pr_check.outputs.should_deploy == 'true'
        run: bash ./scripts/deploy-yc.sh
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.YC_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.YC_SECRET_ACCESS_KEY }}
          AWS_REGION: ru-central1
          AWS_DEFAULT_REGION: ru-central1
          YC_BUCKET_NAME: realcapoeira-ru
          YC_REGION: ru-central1
          YC_STORAGE_ENDPOINT: https://storage.yandexcloud.net

      - name: Install Yandex Cloud CLI
        if: steps.pr_check.outputs.should_deploy == 'true' && env.YC_CDN_RESOURCE_ID != '' && env.YC_SA_KEY_JSON != ''
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash -s -- -i "$HOME/yandex-cloud" -n
          echo "$HOME/yandex-cloud/bin" >> "$GITHUB_PATH"

      - name: Configure Yandex Cloud CLI
        if: steps.pr_check.outputs.should_deploy == 'true' && env.YC_CDN_RESOURCE_ID != '' && env.YC_SA_KEY_JSON != ''
        shell: bash
        run: |
          key_file="$(mktemp)"
          trap 'rm -f "$key_file"' EXIT

          printf '%s' "$YC_SA_KEY_JSON" > "$key_file"

          yc config profile create ci
          yc config set service-account-key "$key_file" --profile ci

      - name: Purge CDN cache
        if: steps.pr_check.outputs.should_deploy == 'true' && env.YC_CDN_RESOURCE_ID != '' && env.YC_SA_KEY_JSON != ''
        run: yc cdn cache purge --profile ci --resource-id "$YC_CDN_RESOURCE_ID" --all --async
